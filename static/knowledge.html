<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习资源与知识节点 | 崇岳鉴渊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fbfbfa;--fg:#1a1a18;
  --fg-70:rgba(26,26,24,0.7);--fg-50:rgba(26,26,24,0.5);
  --fg-30:rgba(26,26,24,0.3);--fg-20:rgba(26,26,24,0.2);
  --fg-10:rgba(26,26,24,0.1);--fg-05:rgba(26,26,24,0.05);
  --muted:#6b6b66;--border:rgba(26,26,24,0.1);
  --font-sans:'Instrument Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}[data-theme="dark"]{--bg:#111110;--fg:#f0f0ee;--fg-70:rgba(240,240,238,0.7);--fg-50:rgba(240,240,238,0.5);--fg-30:rgba(240,240,238,0.3);--fg-20:rgba(240,240,238,0.2);--fg-10:rgba(240,240,238,0.1);--fg-05:rgba(240,240,238,0.05);--fg-03:rgba(240,240,238,0.03);--muted:#8a8a86;--border:rgba(240,240,238,0.12)}
body{font-family:var(--font-sans);background:var(--bg);color:var(--fg);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:0 1.5rem}

.header{border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(251,251,250,.9);backdrop-filter:blur(12px);z-index:50}
[data-theme="dark"] .header{background:rgba(17,17,16,.9)}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:3.5rem}
.logo{font-size:1.25rem;font-weight:700;letter-spacing:-.02em}
.logo span{font-family:var(--font-mono);font-size:.625rem;color:var(--fg-50);margin-left:.25rem}
.back-link{font-size:.875rem;color:var(--muted);transition:color .3s;display:flex;align-items:center;gap:.25rem}
.back-link:hover{color:var(--fg)}

.hero{padding:3rem 0 2rem}
.hero h1{font-size:clamp(1.75rem,4vw,2.5rem);font-weight:700;letter-spacing:-.02em;margin-bottom:.5rem}
.hero p{color:var(--muted);font-size:1.05rem}

.filters{display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);margin-bottom:2rem}
.search-box{flex:1;min-width:200px;max-width:320px;position:relative}
.search-box input{width:100%;padding:.5rem .75rem .5rem 2.25rem;border:1px solid var(--border);border-radius:.5rem;font-family:var(--font-sans);font-size:.875rem;background:var(--bg);color:var(--fg);outline:none;transition:border-color .3s}
.search-box input:focus{border-color:var(--fg-30)}
.search-box svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--fg-30);pointer-events:none}
.cat-btn{padding:.4rem 1rem;border:1px solid var(--border);border-radius:9999px;background:transparent;font-family:var(--font-sans);font-size:.8125rem;color:var(--muted);cursor:pointer;transition:all .3s;white-space:nowrap}
.cat-btn:hover{border-color:var(--fg-30);color:var(--fg)}
.cat-btn.active{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.tag-filter{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.tag-btn{padding:.25rem .75rem;border:1px solid var(--fg-10);border-radius:9999px;background:transparent;font-family:var(--font-sans);font-size:.75rem;color:var(--muted);cursor:pointer;transition:all .3s}
.tag-btn:hover{border-color:var(--fg-30);color:var(--fg)}
.tag-btn.active{background:var(--fg-05);color:var(--fg);border-color:var(--fg-20)}
.clear-btn{font-size:.75rem;color:var(--muted);cursor:pointer;background:none;border:none;margin-left:.5rem;transition:color .3s}
.clear-btn:hover{color:var(--fg)}

.stats{display:flex;gap:1.5rem;margin-bottom:1.5rem;font-size:.8125rem;color:var(--muted)}
.stats strong{color:var(--fg);font-weight:600}

.grid{display:grid;grid-template-columns:1fr;gap:1px;background:var(--fg-10);border:1px solid var(--border)}
@media(min-width:768px){.grid{grid-template-columns:1fr 1fr}}
.card{background:var(--bg);padding:1.5rem;display:flex;flex-direction:column;gap:.75rem;transition:background .3s;cursor:pointer}
.card:hover{background:var(--fg-03)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
.card-cat{font-family:var(--font-mono);font-size:.6875rem;color:var(--fg-30);text-transform:uppercase;letter-spacing:.05em}
.card-featured{font-family:var(--font-mono);font-size:.625rem;background:var(--fg);color:var(--bg);padding:.125rem .5rem;border-radius:9999px;white-space:nowrap}
.card-title{font-size:1.05rem;font-weight:600;line-height:1.4}
.card-desc{font-size:.875rem;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;font-size:.75rem;color:var(--fg-50);margin-top:auto}
.card-meta span{display:flex;align-items:center;gap:.25rem}
.card-tags{display:flex;flex-wrap:wrap;gap:.375rem}
.card-tag{font-size:.6875rem;padding:.125rem .5rem;background:var(--fg-05);border-radius:.25rem;color:var(--fg-50)}
.diff-stars{color:var(--fg-20);letter-spacing:1px}
.diff-stars .filled{color:var(--fg)}

.pagination{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:2rem 0}
.page-btn{width:2.25rem;height:2.25rem;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:.5rem;background:transparent;font-family:var(--font-sans);font-size:.875rem;cursor:pointer;transition:all .3s}
.page-btn:hover:not(:disabled){border-color:var(--fg-30)}
.page-btn.active{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.page-btn:disabled{opacity:.3;cursor:default}
.page-info{font-size:.8125rem;color:var(--muted);padding:0 .5rem}

.empty{text-align:center;padding:4rem 0;color:var(--muted)}
.empty svg{margin-bottom:1rem;color:var(--fg-20)}
.empty h3{font-size:1.25rem;color:var(--fg);margin-bottom:.5rem}

.loading{text-align:center;padding:4rem 0;color:var(--muted)}
.spinner{width:1.5rem;height:1.5rem;border:2px solid var(--fg-10);border-top-color:var(--fg);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

.footer{border-top:1px solid var(--border);padding:2rem 0;text-align:center;font-size:.8125rem;color:var(--muted)}
.theme-toggle{width:2rem;height:2rem;border:none;background:none;cursor:pointer;color:var(--fg-50);display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:color .3s}.theme-toggle:hover{color:var(--fg)}</style>
</head>
<body>
<header class="header">
  <div class="container header-inner">
    <a href="/" class="logo">崇岳鉴渊<span>TM</span></a>
    <a href="/" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      返回首页
    </a>
    <button class="theme-toggle" id="themeToggle" title="切换深色模式" style="width:2rem;height:2rem;border:none;background:none;cursor:pointer;color:var(--fg-50);font-size:1.1rem;display:flex;align-items:center;justify-content:center">&#9788;</button>
  </div>
</header>
<section class="hero">
  <div class="container">
    <h1>学习资源与知识节点</h1>
    <p>六大分类，覆盖公共基础课、专业核心课、学科竞赛、论文写作、升学备考与工具素材</p>
  </div>
</section>
<div class="container">
  <div class="filters">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="搜索资源...">
    </div>
    <button class="cat-btn active" data-cat="">全部</button>
    <div id="catFilters"></div>
  </div>
  <div class="tag-filter" id="tagFilters"></div>
  <div class="stats" id="statsBar"></div>
  <div class="grid" id="resourceGrid">
    <div class="loading"><div class="spinner"></div><p>加载资源中...</p></div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>
<footer class="footer">
  <div class="container"><p>2026 崇岳鉴渊. All rights reserved.</p></div>
</footer>
<script>
var API = "/api/v1";
var state = {category:"",tag:"",search:"",page:1,page_size:20,sort:"newest"};
var allTags = [];
var totalResources = 0;

function qs(obj){return Object.entries(obj).filter(function(e){var v=e[1];return v!==""&&v!=null}).map(function(e){return encodeURIComponent(e[0])+"="+encodeURIComponent(e[1])}).join("&")}

async function fetchJSON(url){
  var r = await fetch(url);
  if(!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function loadCategories(){
  var cats = await fetchJSON(API+"/categories");
  var container = document.getElementById("catFilters");
  container.innerHTML = cats.map(function(c){
    return '<button class="cat-btn" data-cat="'+c.slug+'">'+c.name+' <span style="font-size:.6875rem;opacity:.5">'+c.resource_count+'</span></button>';
  }).join("");
  container.querySelectorAll(".cat-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      state.category = btn.dataset.cat === state.category ? "" : btn.dataset.cat;
      state.tag = ""; state.page = 1;
      updateUI(); loadResources();
    });
  });
}

async function loadTags(){
  allTags = await fetchJSON(API+"/tags");
  renderTags();
}

function renderTags(){
  var container = document.getElementById("tagFilters");
  if(!state.category || allTags.length===0){container.innerHTML="";return}
  var relevant = allTags.filter(function(t){return t.resource_count>0});
  if(relevant.length===0){container.innerHTML="";return}
  container.innerHTML = relevant.map(function(t){
    var active = state.tag===t.slug ? " active" : "";
    return '<button class="tag-btn'+active+'" data-tag="'+t.slug+'">'+t.name+' <span style="opacity:.5">'+t.resource_count+'</span></button>';
  }).join("") + (state.tag ? '<button class="clear-btn" id="clearTag">清除筛选</button>' : "");
  container.querySelectorAll(".tag-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      state.tag = btn.dataset.tag === state.tag ? "" : btn.dataset.tag;
      state.page = 1;
      renderTags(); loadResources();
    });
  });
  var clearBtn = document.getElementById("clearTag");
  if(clearBtn) clearBtn.addEventListener("click",function(){state.tag="";state.page=1;renderTags();loadResources()});
}

async function loadResources(){
  var grid = document.getElementById("resourceGrid");
  grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';
  try{
    var params = Object.assign({}, state);
    if(!params.category) params.tag = "";
    var data = await fetchJSON(API+"/resources?"+qs(params));
    totalResources = data.total;
    renderResources(data.items);
    renderPagination(data);
    updateStats(data);
  }catch(e){
    grid.innerHTML = '<div class="empty"><h3>加载失败</h3><p>请检查网络连接后重试</p></div>';
  }
}

function renderResources(items){
  var grid = document.getElementById("resourceGrid");
  if(items.length===0){
    grid.innerHTML = '<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><h3>未找到匹配资源</h3><p>尝试更换筛选条件或搜索关键词</p></div>';
    return;
  }
  grid.innerHTML = items.map(function(r){
    var tagsHtml = (r.tags||[]).slice(0,3).map(function(t){return '<span class="card-tag">'+t.name+'</span>';}).join("");
    var starsHtml = Array.from({length:5},function(_,i){return i<r.difficulty?'<span class="filled">&#9733;</span>':'&#9734;';}).join("");
    return '<div class="card" data-id="'+r.id+'" style="cursor:pointer">'+
      '<div class="card-header">'+
        '<span class="card-cat">'+r.category_name+'</span>'+
        (r.is_featured ? '<span class="card-featured">精选</span>' : "")+
      '</div>'+
      '<h3 class="card-title">'+r.title+'</h3>'+
      '<p class="card-desc">'+r.description+'</p>'+
      '<div class="card-tags">'+tagsHtml+'</div>'+
      '<div class="card-meta">'+
        '<span>'+r.author+'</span>'+
        '<span>'+r.file_type+' &middot; '+r.file_size+'</span>'+
        '<span class="diff-stars">'+starsHtml+'</span>'+
        '<span style="margin-left:auto">'+(r.view_count||0)+' 次浏览</span>'+
      '</div>'+
    '</div>';
  }).join("");
}

function renderPagination(data){
  var container = document.getElementById("pagination");
  if(data.total_pages<=1){container.innerHTML="";return}
  var html = '<button class="page-btn"'+(data.page<=1?' disabled':'')+' onclick="goPage('+(data.page-1)+')">&larr;</button>';
  for(var i=1;i<=data.total_pages;i++){
    if(i===1||i===data.total_pages||(i>=data.page-2&&i<=data.page+2)){
      html += '<button class="page-btn'+(i===data.page?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
    }else if(i===data.page-3||i===data.page+3){
      html += '<span class="page-info">...</span>';
    }
  }
  html += '<button class="page-btn"'+(data.page>=data.total_pages?' disabled':'')+' onclick="goPage('+(data.page+1)+')">&rarr;</button>';
  html += '<span class="page-info">共 '+data.total+' 条</span>';
  container.innerHTML = html;
}

function goPage(p){state.page=p;loadResources();window.scrollTo({top:300,behavior:"smooth"})}

function updateStats(data){
  document.getElementById("statsBar").innerHTML = '<span>共 <strong>'+data.total+'</strong> 条资源</span><span>第 <strong>'+data.page+'</strong> / <strong>'+data.total_pages+'</strong> 页</span>';
}

function updateUI(){
  document.querySelectorAll(".cat-btn").forEach(function(b){b.classList.toggle("active",b.dataset.cat===state.category)});
  document.getElementById("searchInput").value = state.search;
}

var searchTimer;

// Card click handler
document.getElementById('resourceGrid').addEventListener('click',function(e){
  var card = e.target.closest('.card');
  if(card && card.dataset.id){
    location.href = '/knowledge/' + card.dataset.id;
  }
});
document.getElementById("searchInput").addEventListener("input",function(){
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function(){
    state.search = document.getElementById("searchInput").value.trim();
    state.page = 1;
    loadResources();
  },400);
});

(async function(){
  await loadCategories();
  await loadTags();
  await loadResources();
})();
</script>
<script>(function(){var t=localStorage.getItem('cyjy_theme')||'light';document.documentElement.setAttribute('data-theme',t);var b=document.getElementById('themeToggle');if(b){b.innerHTML=t==='dark'?'&#9789;':'&#9788;';b.addEventListener('click',function(){t=t==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('cyjy_theme',t);b.innerHTML=t==='dark'?'&#9789;':'&#9788;'})}})();</script>
</body>
</html>
